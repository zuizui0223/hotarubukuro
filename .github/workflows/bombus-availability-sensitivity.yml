name: PR4 Bombus availability sensitivity

on:
  workflow_dispatch:
  push:
    branches: ["review/reproducibility-audit"]
    paths:
      - ".github/workflows/bombus-availability-sensitivity.yml"
      - "R/bombus_availability.R"
      - "scripts/run_bombus_availability_sensitivity.R"

permissions:
  contents: read

concurrency:
  group: pr4-bombus-availability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sensitivity:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"

      - name: Install spatial system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Restore PR4 locked R environment
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Restore public raster caches
        uses: actions/cache@v4
        with:
          path: |
            data/cache/rasters
            data/processed/rasters
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
          key: pr4-public-rasters-${{ runner.os }}-${{ hashFiles('config/pipeline.yml', 'config/raster_sources.csv', 'R/raster_sources.R', 'scripts/download_rasters.R', 'scripts/prepare_rasters.R') }}
          restore-keys: |
            pr4-public-rasters-${{ runner.os }}-

      - name: Ensure PR4 public rasters
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s data/processed/raster_manifest.csv ]] || [[ $(find data/processed/rasters -name '*.tif' -size +0c 2>/dev/null | wc -l) -lt 19 ]]; then
            Rscript scripts/download_rasters.R
            Rscript scripts/prepare_rasters.R --force --no-download
          fi

      - name: Run the successful PR4 reanalysis path
        shell: bash
        run: |
          set -euo pipefail
          rm -rf results/ci/pr4_reanalysis results/ci/bombus_availability
          Rscript scripts/run_reanalysis.R \
            --input Data_S1.csv \
            --legacy-input data/legacy/Data_S1_legacy.csv \
            --config config/reanalysis.yml \
            --pipeline config/pipeline.yml \
            --public-raster-manifest data/processed/raster_manifest.csv \
            --raster-registry config/raster_sources.csv \
            --sdm-dir sdm \
            --output-dir results/ci/pr4_reanalysis

      - name: Add only the Bombus availability sensitivity
        shell: bash
        run: |
          set -euo pipefail
          Rscript scripts/run_bombus_availability_sensitivity.R \
            --input results/ci/pr4_reanalysis/inputs/inclusive__primary.csv \
            --config config/reanalysis.yml \
            --output-dir results/ci/bombus_availability
          cat results/ci/bombus_availability/performance.csv

      - name: Validate sensitivity outputs
        shell: Rscript {0}
        run: |
          path <- "results/ci/bombus_availability/performance.csv"
          stopifnot(file.exists(path))
          x <- read.csv(path, check.names = FALSE)
          expected <- c(
            "environment_only",
            "Bombus_suitability_sum",
            "Bombus_any_availability",
            "Bombus_max_availability"
          )
          stopifnot(setequal(x$model_variant, expected))
          stopifnot(length(unique(x$records_common)) == 1L)
          stopifnot(all(is.finite(x$q_squared_cv)))

      - name: Upload PR4-based results
        uses: actions/upload-artifact@v4
        with:
          name: pr4-bombus-availability-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            results/ci/pr4_reanalysis/model_performance.csv
            results/ci/pr4_reanalysis/model_performance_by_fold.csv
            results/ci/pr4_reanalysis/row_flow.csv
            results/ci/pr4_reanalysis/raster_join_audit.csv
            results/ci/bombus_availability
          if-no-files-found: error
          retention-days: 14
