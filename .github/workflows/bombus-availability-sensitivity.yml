name: PR4 expanded Bombus availability analysis

on:
  workflow_dispatch:
  push:
    branches: ["review/reproducibility-audit"]
    paths:
      - ".github/workflows/bombus-availability-sensitivity.yml"
      - "config/raster_sources.csv"
      - "R/bombus_availability.R"
      - "scripts/run_expanded_bombus_analysis.R"

permissions:
  contents: read

concurrency:
  group: pr4-expanded-bombus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  expanded-analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"

      - name: Install spatial system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Restore PR4 locked R environment
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 3

      - name: Restore public raster caches
        uses: actions/cache@v4
        with:
          path: |
            data/cache/rasters
            data/processed/rasters
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
          key: pr4-expanded-rasters-${{ runner.os }}-${{ hashFiles('config/pipeline.yml', 'config/raster_sources.csv', 'R/raster_sources.R', 'scripts/download_rasters.R', 'scripts/prepare_rasters.R') }}
          restore-keys: |
            pr4-expanded-rasters-${{ runner.os }}-
            pr4-public-rasters-${{ runner.os }}-

      - name: Ensure expanded public rasters
        shell: bash
        run: |
          set -euo pipefail
          required=(
            chelsa_bio05 chelsa_bio10 chelsa_gdd5 chelsa_cmimean chelsa_vpdmean
            chelsa_bio12 chelsa_bio14 chelsa_bio15 chelsa_swb chelsa_rsdsmean
            elevation_30s soilgrids_bdod_0_5cm_mean soilgrids_cfvo_0_5cm_mean
            soilgrids_sand_0_5cm_mean soilgrids_silt_0_5cm_mean
            soilgrids_nitrogen_0_5cm_mean soilgrids_ocd_0_5cm_mean
            soilgrids_soc_0_5cm_mean soilgrids_phh2o_0_5cm_mean
            worldpop_2020_count_30s worldpop_2020_density_per_km2_30s
          )
          missing=0
          for stem in "${required[@]}"; do
            [[ -s "data/processed/rasters/${stem}.tif" ]] || missing=1
          done
          if [[ "$missing" -eq 1 ]]; then
            if ! Rscript scripts/download_rasters.R >download.log 2>&1; then
              echo "=== raster download failure ==="
              tail -n 240 download.log
              exit 1
            fi
            if ! Rscript scripts/prepare_rasters.R --force --no-download >prepare.log 2>&1; then
              echo "=== raster preparation failure ==="
              tail -n 240 prepare.log
              exit 1
            fi
          fi

      - name: Run the validated PR4 reanalysis path
        shell: bash
        run: |
          set -euo pipefail
          rm -rf results/ci/pr4_reanalysis results/ci/expanded_bombus
          Rscript scripts/run_reanalysis.R \
            --input Data_S1.csv \
            --legacy-input data/legacy/Data_S1_legacy.csv \
            --config config/reanalysis.yml \
            --pipeline config/pipeline.yml \
            --public-raster-manifest data/processed/raster_manifest.csv \
            --raster-registry config/raster_sources.csv \
            --sdm-dir sdm \
            --output-dir results/ci/pr4_reanalysis

      - name: Run PR5-equivalent expanded analysis
        shell: bash
        run: |
          set -euo pipefail
          Rscript scripts/run_expanded_bombus_analysis.R \
            --input results/ci/pr4_reanalysis/inputs/inclusive__primary.csv \
            --config config/reanalysis.yml \
            --raster-dir data/processed/rasters \
            --output-dir results/ci/expanded_bombus
          cat results/ci/expanded_bombus/performance.csv

      - name: Validate expanded outputs
        shell: Rscript {0}
        run: |
          output_dir <- "results/ci/expanded_bombus"
          required_files <- c(
            "performance.csv",
            "coefficients.csv",
            "performance_by_fold.csv",
            "environment_pca_loadings.csv",
            "analysis_data.csv",
            "row_flow.csv"
          )
          paths <- file.path(output_dir, required_files)
          stopifnot(all(file.exists(paths)), all(file.info(paths)$size > 0))

          x <- read.csv(file.path(output_dir, "performance.csv"), check.names = FALSE)
          expected <- c(
            "environment_only",
            "Bombus_suitability_sum",
            "Bombus_any_availability",
            "Bombus_max_availability"
          )
          stopifnot(setequal(x$model_variant, expected))
          stopifnot(length(unique(x$records_common)) == 1L)
          stopifnot(unique(x$records_common) > 0L)
          stopifnot(all(is.finite(x$q_squared_cv)))

          by_fold <- read.csv(file.path(output_dir, "performance_by_fold.csv"))
          stopifnot(setequal(unique(by_fold$model_variant), expected))
          stopifnot(length(unique(by_fold$fold)) == 5L)

          loadings <- read.csv(file.path(output_dir, "environment_pca_loadings.csv"))
          stopifnot(setequal(unique(loadings$group), c(
            "Temperature_PC1", "precip_PC1", "soil_phys_PC1",
            "soil_nutrient_PC1", "topo_PC1"
          )))

      - name: Upload expanded results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr4-expanded-bombus-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            download.log
            prepare.log
            results/ci/pr4_reanalysis/model_performance.csv
            results/ci/pr4_reanalysis/model_performance_by_fold.csv
            results/ci/pr4_reanalysis/row_flow.csv
            results/ci/pr4_reanalysis/raster_join_audit.csv
            results/ci/expanded_bombus
          if-no-files-found: warn
          retention-days: 14
