name: Extract failed full-analysis log

on:
  push:
    branches: ["analysis/minimal-bombus-availability"]
    paths:
      - ".github/workflows/extract-failed-log.yml"

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  extract:
    if: contains(github.event.head_commit.message, '[extract-failed-log]')
    runs-on: ubuntu-24.04
    env:
      REPOSITORY: zuizui0223/hotarubukuro
      PR_NUMBER: "5"
      FAILED_JOB_ID: "88291599856"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download the failed job log
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            --output failed-job.log
          test -s failed-job.log

      - name: Isolate the failing analysis step
        shell: python
        run: |
          from pathlib import Path
          import os
          import re

          job_id = os.environ["FAILED_JOB_ID"]
          source = Path("failed-job.log")
          text = source.read_text(encoding="utf-8-sig", errors="replace")
          lines = text.splitlines()
          anchors = [
              i for i, line in enumerate(lines)
              if "Run environment-adjusted SPDE-INLA analysis" in line
          ]
          start = anchors[-1] if anchors else max(0, len(lines) - 500)
          excerpt = lines[start:]

          # Keep the actionable tail compact enough for an issue comment while
          # retaining the command, warnings, R error, and runner annotation.
          excerpt = excerpt[-450:]
          cleaned = []
          ansi = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")
          for line in excerpt:
              line = ansi.sub("", line)
              line = re.sub(r"^\d{4}-\d{2}-\d{2}T[^ ]+Z ?", "", line)
              cleaned.append(line)

          rendered = "\n".join(cleaned)
          if len(rendered) > 18000:
              rendered = rendered[-18000:]
          Path("failure-excerpt.txt").write_text(rendered + "\n", encoding="utf-8")

          body = (
              "### Automated CI failure extraction\n\n"
              f"Source: failed Actions job `{job_id}`. "
              "The excerpt begins at the full-analysis step and is clipped to the actionable tail.\n\n"
              "```text\n"
              + rendered.replace("```", "` ` `")
              + "\n```\n"
          )
          Path("failure-comment.md").write_text(body, encoding="utf-8")

      - name: Post the extracted failure on PR 5
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="$(cat failure-comment.md)"

      - name: Upload the raw and reduced logs
        uses: actions/upload-artifact@v4
        with:
          name: failed-analysis-log-${{ github.run_number }}
          path: |
            failed-job.log
            failure-excerpt.txt
          retention-days: 7
