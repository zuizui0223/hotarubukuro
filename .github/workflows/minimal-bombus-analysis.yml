name: Minimal Bombus availability analysis

on:
  push:
    branches: ["analysis/minimal-bombus-availability"]
    paths-ignore:
      - "results/bombus_availability/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: analysis/minimal-bombus-availability
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"
      - name: Install spatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libgdal-dev libgeos-dev libproj-dev
      - name: Install R dependency
        shell: Rscript {0}
        run: install.packages("terra", repos = "https://cloud.r-project.org")
      - name: Run analysis
        run: Rscript analysis/run_bombus_availability.R
      - name: Commit result tables
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/bombus_availability
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "Record minimal Bombus sensitivity results [skip ci]"
            git push
          fi
