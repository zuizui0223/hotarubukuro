name: Legacy-environment SPDE-INLA analysis

on:
  workflow_dispatch:
    inputs:
      force_download:
        description: Redownload public raster subsets instead of reusing the cache
        required: true
        default: false
        type: boolean
      force_process:
        description: Rebuild aligned rasters even when fingerprints still match
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: legacy-environment-spde-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyse:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libcurl4-openssl-dev libssl-dev unzip

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c("terra", "sf", "yaml", "digest", "jsonlite"),
            repos = "https://cloud.r-project.org"
          )
          install.packages(
            "INLA",
            repos = c(
              getOption("repos"),
              INLA = "https://inla.r-inla-download.org/R/stable"
            ),
            dependencies = TRUE
          )
          stopifnot(
            requireNamespace("terra", quietly = TRUE),
            requireNamespace("sf", quietly = TRUE),
            requireNamespace("yaml", quietly = TRUE),
            requireNamespace("digest", quietly = TRUE),
            requireNamespace("INLA", quietly = TRUE)
          )

      - name: Restore public-raster cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/rasters
            data/processed/rasters
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
          key: legacy-rasters-v3-${{ runner.os }}-${{ hashFiles('config/pipeline.yml', 'config/raster_sources.csv', 'R/raster_sources.R', 'scripts/download_rasters.R', 'scripts/prepare_rasters.R') }}
          restore-keys: |
            legacy-rasters-v3-${{ runner.os }}-

      - name: Parse executed scripts
        shell: Rscript {0}
        run: |
          parse(file = "scripts/download_rasters.R")
          parse(file = "scripts/prepare_rasters.R")
          parse(file = "analysis/run_bombus_availability.R")

      - name: Download legacy environmental rasters
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${{ inputs.force_download }}" == "true" ]]; then
            args+=(--force)
          fi
          Rscript scripts/download_rasters.R "${args[@]}"

      - name: Prepare aligned raster stack
        shell: bash
        run: |
          set -euo pipefail
          args=(--no-download)
          if [[ "${{ inputs.force_process }}" == "true" ]]; then
            args+=(--force)
          fi
          Rscript scripts/prepare_rasters.R "${args[@]}"

      - name: Run environment-adjusted SPDE-INLA analysis
        shell: bash
        run: |
          set -o pipefail
          Rscript analysis/run_bombus_availability.R \
            Data_S1.csv data/processed/rasters sdm results/bombus_availability \
            2>&1 | tee analysis.log

      - name: Validate outputs
        shell: Rscript {0}
        run: |
          required <- file.path(
            "results/bombus_availability",
            c(
              "spde_model_comparison.csv",
              "spde_fixed_effects.csv",
              "spde_hyperparameters.csv",
              "blocked_cv_summary.csv",
              "environment_pca_loadings.csv",
              "row_flow.csv",
              "spatial_group_diagnostic.csv",
              "analysis_data.csv"
            )
          )
          stopifnot(all(file.exists(required)))
          comparison <- read.csv(required[[1]])
          stopifnot(
            nrow(comparison) == 4L,
            all(is.finite(comparison$WAIC)),
            "environment_only" %in% comparison$model,
            "environment_plus_bombus_sum" %in% comparison$model
          )
          flow <- read.csv(file.path("results/bombus_availability", "row_flow.csv"))
          stopifnot(flow$n[flow$stage == "common_model_cohort"] >= 50)

      - name: Upload diagnostics and reviewer-facing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-environment-spde-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            analysis.log
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
            results/bombus_availability
          if-no-files-found: warn
          retention-days: 14
