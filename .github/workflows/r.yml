name: R script checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  parse-r-scripts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up R 4.5.1
        uses: r-lib/actions/setup-r@f57f1301a053485946083d7a45022b278929a78a
        with:
          r-version: "4.5.1"
      - name: Parse R scripts
        shell: Rscript {0}
        run: |
          files <- list.files(
            ".",
            pattern = "\\.R$",
            recursive = TRUE,
            full.names = TRUE
          )
          stopifnot(length(files) > 0L)
          for (file in files) {
            message("Parsing ", file)
            parse(file = file)
          }
