name: R syntax checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate-r-syntax:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up R 4.5.1
        uses: r-lib/actions/setup-r@f57f1301a053485946083d7a45022b278929a78a
        with:
          r-version: "4.5.1"
      - name: Parse R scripts and R Markdown chunks
        shell: Rscript {0}
        run: |
          parse_text <- function(text, label) {
            tryCatch(
              parse(text = text, keep.source = FALSE),
              error = function(error) {
                stop(sprintf("Syntax error in %s: %s", label, conditionMessage(error)), call. = FALSE)
              }
            )
          }

          parse_rmd_chunks <- function(file) {
            lines <- readLines(file, warn = FALSE, encoding = "UTF-8")
            in_chunk <- FALSE
            chunk <- character()
            chunk_start <- NA_integer_
            found_chunk <- FALSE

            for (i in seq_along(lines)) {
              line <- lines[[i]]
              if (!in_chunk && grepl("^\\s*```\\{[rR]([ ,}]|$)", line, perl = TRUE)) {
                in_chunk <- TRUE
                chunk <- character()
                chunk_start <- i + 1L
                found_chunk <- TRUE
                next
              }
              if (in_chunk && grepl("^\\s*```\\s*$", line, perl = TRUE)) {
                if (length(chunk)) {
                  parse_text(chunk, sprintf("%s (lines %d-%d)", file, chunk_start, i - 1L))
                }
                in_chunk <- FALSE
                next
              }
              if (in_chunk) chunk <- c(chunk, line)
            }

            if (in_chunk) {
              stop(sprintf("Unclosed R Markdown chunk in %s starting at line %d", file, chunk_start), call. = FALSE)
            }
            if (!found_chunk) {
              stop(sprintf("No R Markdown chunks found in %s", file), call. = FALSE)
            }
          }

          files <- list.files(
            ".",
            pattern = "\\.(R|Rmd)$",
            recursive = TRUE,
            full.names = TRUE
          )
          stopifnot(length(files) > 0L)

          for (file in files) {
            lines <- readLines(file, warn = FALSE, encoding = "UTF-8")
            is_r_markdown <- any(grepl("^\\s*```\\{[rR]([ ,}]|$)", lines, perl = TRUE))
            message("Checking ", file)
            if (is_r_markdown) {
              parse_rmd_chunks(file)
            } else {
              parse_text(lines, file)
            }
          }
