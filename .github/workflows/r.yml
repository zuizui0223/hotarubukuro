name: Reproducibility checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Python test dependencies
        run: |
          python -m pip install 'uv==0.11.28'
          uv sync --locked --python 3.11 --extra test --extra excel
      - name: Compile tracked Python files
        run: |
          uv run --locked python - <<'PY'
          import py_compile
          import subprocess

          files = subprocess.check_output(
              ["git", "ls-files", "*.py"], text=True
          ).splitlines()
          if not files:
              raise SystemExit("No tracked Python files found")
          for path in files:
              print("Checking", path)
              py_compile.compile(path, doraise=True)
          PY
      - name: Run lightweight Python tests
        run: uv run --locked python -m pytest tests/python
      - name: Record Python environment
        run: uv pip freeze

  r-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"
      - name: Parse R scripts and R Markdown chunks
        shell: Rscript {0}
        run: |
          parse_text <- function(text, label) {
            tryCatch(
              parse(text = text, keep.source = FALSE),
              error = function(error) {
                stop(sprintf("Syntax error in %s: %s", label, conditionMessage(error)), call. = FALSE)
              }
            )
          }

          parse_rmd_chunks <- function(file) {
            lines <- readLines(file, warn = FALSE, encoding = "UTF-8")
            in_chunk <- FALSE
            chunk <- character()
            chunk_start <- NA_integer_
            found_chunk <- FALSE

            for (i in seq_along(lines)) {
              line <- lines[[i]]
              if (!in_chunk && grepl("^\\s*```\\{[rR]([ ,}]|$)", line, perl = TRUE)) {
                in_chunk <- TRUE
                chunk <- character()
                chunk_start <- i + 1L
                found_chunk <- TRUE
                next
              }
              if (in_chunk && grepl("^\\s*```\\s*$", line, perl = TRUE)) {
                if (length(chunk)) {
                  parse_text(chunk, sprintf("%s (lines %d-%d)", file, chunk_start, i - 1L))
                }
                in_chunk <- FALSE
                next
              }
              if (in_chunk) chunk <- c(chunk, line)
            }

            if (in_chunk) {
              stop(sprintf("Unclosed R Markdown chunk in %s starting at line %d", file, chunk_start), call. = FALSE)
            }
            if (!found_chunk) {
              stop(sprintf("No R Markdown chunks found in %s", file), call. = FALSE)
            }
          }

          files <- list.files(
            ".",
            pattern = "\\.(R|Rmd)$",
            recursive = TRUE,
            full.names = TRUE
          )
          stopifnot(length(files) > 0L)

          for (file in files) {
            lines <- readLines(file, warn = FALSE, encoding = "UTF-8")
            is_r_markdown <- any(grepl("^\\s*```\\{[rR]([ ,}]|$)", lines, perl = TRUE))
            message("Checking ", file)
            if (is_r_markdown) {
              parse_rmd_chunks(file)
            } else {
              parse_text(lines, file)
            }
          }
      - name: Install lightweight R test dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("testthat", "terra", "digest", "yaml"))
      - name: Run R unit and data-contract tests
        shell: Rscript {0}
        run: |
          testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)
          sessionInfo()
