name: "Stage 2 - Validate publication extraction"

on:
  workflow_dispatch:
    inputs:
      stage1_run_id:
        description: Stage 1 workflow run ID containing prepared-publication-rasters
        required: true
        type: string
      raster_artifact_name:
        description: Stage 1 artifact name
        required: true
        default: prepared-publication-rasters
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: publication-stage-2-${{ github.ref }}
  cancel-in-progress: false

env:
  R_VERSION: "4.4.3"

jobs:
  validate-extraction:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: publication-r-${{ runner.os }}-${{ env.R_VERSION }}-spatial-v2
          restore-keys: |
            publication-r-${{ runner.os }}-${{ env.R_VERSION }}-

      - name: Install spatial dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev
          Rscript -e 'needed <- c("terra","sf","yaml"); missing <- needed[!vapply(needed, requireNamespace, logical(1), quietly=TRUE)]; if(length(missing)) install.packages(missing, repos="https://cloud.r-project.org"); stopifnot(vapply(needed, requireNamespace, logical(1), quietly=TRUE))'

      - name: Download Stage 1 prepared rasters
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.raster_artifact_name }}
          path: data/processed
          repository: ${{ github.repository }}
          run-id: ${{ inputs.stage1_run_id }}
          github-token: ${{ github.token }}

      - name: Verify restored Stage 1 artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s data/processed/raster_manifest.csv
          test -d data/processed/rasters
          count=$(find data/processed/rasters -maxdepth 1 -type f -name '*.tif' | wc -l)
          test "$count" -ge 19
          echo "Restored $count rasters from Stage 1 run ${{ inputs.stage1_run_id }}."

      - name: Parse extraction diagnostic
        shell: Rscript {0}
        run: parse(file = "analysis/diagnose_all_extraction.R")

      - name: Validate all environmental and Bombus extraction
        shell: bash
        run: |
          set -euo pipefail
          Rscript analysis/diagnose_all_extraction.R \
            Data_S1.csv data/processed/rasters sdm results/all_extraction_diagnostic \
            >all-extraction.log 2>&1
          cat all-extraction.log

      - name: Check diagnostic outputs
        shell: bash
        run: |
          set -euo pipefail
          test -s all-extraction.log
          test -d results/all_extraction_diagnostic
          test "$(find results/all_extraction_diagnostic -type f | wc -l)" -ge 1

      - name: Upload reusable extraction diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: publication-extraction-diagnostics
          path: |
            all-extraction.log
            results/all_extraction_diagnostic
          if-no-files-found: error
          retention-days: 90

      - name: Write reuse instructions
        shell: bash
        run: |
          {
            echo "## Stage 2 completed"
            echo "Stage 1 run ID: ${{ inputs.stage1_run_id }}"
            echo "Stage 2 run ID: ${{ github.run_id }}"
            echo "Artifact: publication-extraction-diagnostics"
            echo "Stage 3 must use both run IDs separately."
          } >> "$GITHUB_STEP_SUMMARY"
