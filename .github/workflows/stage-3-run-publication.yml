name: "Stage 3 - Run publication models from artifact"

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Workflow run ID containing the prepared-publication-rasters artifact
        required: true
        default: "29785336644"
        type: string
      source_artifact_name:
        description: Name of the Stage 1 raster artifact
        required: true
        default: "prepared-publication-rasters"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: publication-stage-3-${{ github.ref }}
  cancel-in-progress: false

env:
  R_VERSION: "4.4.3"

jobs:
  run-models:
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: publication-r-${{ runner.os }}-${{ env.R_VERSION }}-models-v3
          restore-keys: |
            publication-r-${{ runner.os }}-${{ env.R_VERSION }}-

      - name: Install system libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            build-essential gfortran \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libcurl4-openssl-dev libssl-dev

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install model dependencies
        shell: Rscript {0}
        run: |
          repos <- c(CRAN = "https://cloud.r-project.org")
          options(repos = repos)

          # qgam >= 2.0.0 requires mgcv >= 1.9. Install/update mgcv first,
          # rather than treating the older recommended mgcv as sufficient.
          if (!requireNamespace("mgcv", quietly = TRUE) ||
              utils::packageVersion("mgcv") < "1.9.0") {
            install.packages("mgcv", repos = repos, dependencies = TRUE)
          }

          base_needed <- c("terra", "sf", "lavaan", "yaml", "geodata", "digest", "jsonlite")
          missing <- base_needed[!vapply(base_needed, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) install.packages(missing, repos = repos, dependencies = TRUE)

          if (!requireNamespace("qgam", quietly = TRUE)) {
            install.packages("qgam", repos = repos, dependencies = TRUE)
          }

          if (!requireNamespace("INLA", quietly = TRUE)) {
            install.packages(
              "INLA",
              repos = c(repos, INLA = "https://inla.r-inla-download.org/R/stable"),
              dependencies = c("Depends", "Imports", "LinkingTo")
            )
          }

          ok <- vapply(c(base_needed, "mgcv", "qgam", "INLA"), requireNamespace, logical(1), quietly = TRUE)
          if (!all(ok)) stop("Failed to install/load: ", paste(names(ok)[!ok], collapse = ", "))
          stopifnot(utils::packageVersion("mgcv") >= "1.9.0")
          cat("mgcv:", as.character(utils::packageVersion("mgcv")), "\n")
          cat("qgam:", as.character(utils::packageVersion("qgam")), "\n")

      - name: Download prepared rasters from prior Stage 1 run
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.source_artifact_name }}
          path: data/processed
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Verify restored raster artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s data/processed/raster_manifest.csv
          test -d data/processed/rasters
          count=$(find data/processed/rasters -maxdepth 1 -type f -name '*.tif' | wc -l)
          test "$count" -ge 19
          echo "Restored $count prepared rasters from run ${{ inputs.source_run_id }}."

      - name: Restore human predictor cache
        uses: actions/cache@v4
        with:
          path: data/cache/human
          key: publication-human-v2-${{ hashFiles('config/anthropogenic.yml', 'scripts/download_human_predictors.R') }}
          restore-keys: |
            publication-human-v2-

      - name: Download missing human predictors
        run: Rscript scripts/download_human_predictors.R data/cache/human

      - name: Parse publication analysis
        shell: Rscript {0}
        run: parse(file = "analysis/run_publication_workflow.R")

      - name: Run integrated SPDE and qGAM analysis
        shell: bash
        run: |
          set +e
          Rscript analysis/run_publication_workflow.R \
            Data_S1.csv data/processed/rasters sdm data/cache/human results/publication \
            >publication-analysis.log 2>&1
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "=== publication analysis failure tail ==="
            tail -n 300 publication-analysis.log
            exit "$status"
          fi
          tail -n 100 publication-analysis.log

      - name: Validate manuscript outputs
        shell: Rscript {0}
        run: |
          required <- file.path("results/publication", c(
            "cfa_standardized_loadings.csv",
            "environment_pca_loadings.csv",
            "bombus_environment_correlations.csv",
            "integrated_spde_model_diagnostics.csv",
            "integrated_spde_fixed_effects.csv",
            "qgam_model_summary.csv",
            "anthropogenic_outlier_review.csv",
            "sessionInfo.txt"
          ))
          missing <- required[!file.exists(required)]
          if (length(missing)) stop("Missing publication outputs: ", paste(missing, collapse = ", "))
          stopifnot(all(file.info(required)$size > 0))

      - name: Upload logs and publication outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publication-models-${{ github.sha }}-${{ github.run_id }}
          path: |
            publication-analysis.log
            results/publication
          if-no-files-found: warn
          retention-days: 30
