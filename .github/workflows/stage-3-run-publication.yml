name: "Stage 3 - Run publication models from artifacts"

on:
  workflow_dispatch:
    inputs:
      stage1_run_id:
        description: Stage 1 run ID containing prepared rasters
        required: true
        type: string
      stage2_run_id:
        description: Stage 2 run ID containing extraction diagnostics
        required: true
        type: string
      raster_artifact_name:
        description: Stage 1 raster artifact name
        required: true
        default: prepared-publication-rasters
        type: string
      extraction_artifact_name:
        description: Stage 2 diagnostics artifact name
        required: true
        default: publication-extraction-diagnostics
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: publication-stage-3-${{ github.ref }}
  cancel-in-progress: false

env:
  R_VERSION: "4.4.3"

jobs:
  run-models:
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: publication-r-${{ runner.os }}-${{ env.R_VERSION }}-models-v4
          restore-keys: |
            publication-r-${{ runner.os }}-${{ env.R_VERSION }}-

      - name: Install system libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            build-essential gfortran \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libcurl4-openssl-dev libssl-dev

      - name: Install Python package
        run: python -m pip install -e .

      - name: Install or update mgcv in an isolated R session
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e '
            repos <- c(CRAN="https://cloud.r-project.org")
            installed <- requireNamespace("mgcv", quietly=TRUE)
            current <- if (installed) as.character(utils::packageVersion("mgcv")) else "0"
            if (!installed || utils::packageVersion("mgcv") < "1.9.0") {
              install.packages("mgcv", repos=repos, dependencies=c("Depends","Imports","LinkingTo"))
            }
            cat("mgcv installation session complete; prior version:", current, "\n")
          '

      - name: Install qgam and core packages in a fresh R session
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e '
            repos <- c(CRAN="https://cloud.r-project.org")
            stopifnot(requireNamespace("mgcv", quietly=TRUE))
            cat("fresh-session mgcv:", as.character(utils::packageVersion("mgcv")), "\n")
            stopifnot(utils::packageVersion("mgcv") >= "1.9.0")
            core <- c("terra","sf","lavaan","yaml","geodata","digest","jsonlite")
            missing <- core[!vapply(core, requireNamespace, logical(1), quietly=TRUE)]
            if (length(missing)) install.packages(missing, repos=repos, dependencies=c("Depends","Imports","LinkingTo"))
            if (!requireNamespace("qgam", quietly=TRUE)) {
              install.packages("qgam", repos=repos, dependencies=c("Depends","Imports","LinkingTo"))
            }
            stopifnot(requireNamespace("qgam", quietly=TRUE))
            cat("qgam:", as.character(utils::packageVersion("qgam")), "\n")
          '

      - name: Install INLA in a fresh R session
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e '
            repos <- c(CRAN="https://cloud.r-project.org", INLA="https://inla.r-inla-download.org/R/stable")
            if (!requireNamespace("INLA", quietly=TRUE)) {
              install.packages("INLA", repos=repos, dependencies=c("Depends","Imports","LinkingTo"))
            }
            required <- c("terra","sf","lavaan","yaml","geodata","digest","jsonlite","mgcv","qgam","INLA")
            ok <- vapply(required, requireNamespace, logical(1), quietly=TRUE)
            if (!all(ok)) stop("Failed to install/load: ", paste(names(ok)[!ok], collapse=", "))
          '

      - name: Download prepared rasters from Stage 1
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.raster_artifact_name }}
          path: data/processed
          repository: ${{ github.repository }}
          run-id: ${{ inputs.stage1_run_id }}
          github-token: ${{ github.token }}

      - name: Download extraction diagnostics from Stage 2
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.extraction_artifact_name }}
          path: stage2-artifact
          repository: ${{ github.repository }}
          run-id: ${{ inputs.stage2_run_id }}
          github-token: ${{ github.token }}

      - name: Verify restored artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s data/processed/raster_manifest.csv
          test -d data/processed/rasters
          raster_count=$(find data/processed/rasters -maxdepth 1 -type f -name '*.tif' | wc -l)
          test "$raster_count" -ge 19
          diag_count=$(find stage2-artifact -type f | wc -l)
          test "$diag_count" -ge 1
          echo "Restored $raster_count rasters from Stage 1 run ${{ inputs.stage1_run_id }}."
          echo "Restored $diag_count diagnostic files from Stage 2 run ${{ inputs.stage2_run_id }}."

      - name: Restore human predictor cache
        uses: actions/cache@v4
        with:
          path: data/cache/human
          key: publication-human-v2-${{ hashFiles('config/anthropogenic.yml', 'scripts/download_human_predictors.R') }}
          restore-keys: |
            publication-human-v2-

      - name: Download missing human predictors
        run: Rscript scripts/download_human_predictors.R data/cache/human

      - name: Parse publication analysis
        shell: Rscript {0}
        run: parse(file = "analysis/run_publication_workflow.R")

      - name: Run integrated SPDE and qGAM analysis
        shell: bash
        run: |
          set +e
          Rscript analysis/run_publication_workflow.R \
            Data_S1.csv data/processed/rasters sdm data/cache/human results/publication \
            >publication-analysis.log 2>&1
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "=== publication analysis failure tail ==="
            tail -n 300 publication-analysis.log
            exit "$status"
          fi
          tail -n 100 publication-analysis.log

      - name: Validate manuscript outputs
        shell: Rscript {0}
        run: |
          required <- file.path("results/publication", c(
            "cfa_standardized_loadings.csv",
            "environment_pca_loadings.csv",
            "bombus_environment_correlations.csv",
            "integrated_spde_model_diagnostics.csv",
            "integrated_spde_fixed_effects.csv",
            "qgam_model_summary.csv",
            "anthropogenic_outlier_review.csv",
            "sessionInfo.txt"
          ))
          missing <- required[!file.exists(required)]
          if (length(missing)) stop("Missing publication outputs: ", paste(missing, collapse=", "))
          stopifnot(all(file.info(required)$size > 0))

      - name: Upload logs and publication outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publication-models-${{ github.run_id }}
          path: |
            publication-analysis.log
            results/publication
            stage2-artifact
          if-no-files-found: warn
          retention-days: 90
