name: One-shot CRS-fix full-analysis verification

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/verify-crs-fix.yml"
      - "analysis/run_bombus_availability.R"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-crs-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Restore R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: verify-r-v1-${{ runner.os }}-4.4.3-${{ hashFiles('.github/workflows/verify-crs-fix.yml') }}
          restore-keys: |
            verify-r-v1-${{ runner.os }}-4.4.3-

      - name: Install system libraries quietly
        shell: bash
        run: |
          set -euo pipefail
          if ! {
            sudo apt-get update -qq
            sudo apt-get install --yes --no-install-recommends \
              libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
              libcurl4-openssl-dev libssl-dev unzip
          } >setup-system.log 2>&1; then
            tail -n 160 setup-system.log
            exit 1
          fi

      - name: Install missing R packages quietly
        shell: bash
        run: |
          set -euo pipefail
          if ! Rscript -e '
            options(timeout = 1200)
            cran <- c("terra", "sf", "yaml", "digest", "jsonlite")
            missing <- cran[!vapply(cran, requireNamespace, logical(1), quietly = TRUE)]
            if (length(missing)) install.packages(missing, repos = "https://cloud.r-project.org")
            if (!requireNamespace("INLA", quietly = TRUE)) {
              repos <- c(
                "https://inla.r-inla-download.org/R/stable",
                "https://inla.r-inla-download.org/R/testing"
              )
              for (repo in repos) {
                for (attempt in 1:3) {
                  try(install.packages("INLA", repos = c(CRAN = "https://cloud.r-project.org", INLA = repo), dependencies = TRUE), silent = TRUE)
                  if (requireNamespace("INLA", quietly = TRUE)) break
                  Sys.sleep(10 * attempt)
                }
                if (requireNamespace("INLA", quietly = TRUE)) break
              }
            }
            stopifnot(
              requireNamespace("terra", quietly = TRUE),
              requireNamespace("sf", quietly = TRUE),
              requireNamespace("yaml", quietly = TRUE),
              requireNamespace("digest", quietly = TRUE),
              requireNamespace("INLA", quietly = TRUE)
            )
          ' >setup-r.log 2>&1; then
            tail -n 260 setup-r.log
            exit 1
          fi

      - name: Restore public-raster source cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/rasters
            data/processed/raster_download_manifest.csv
          key: legacy-raster-sources-v4-${{ runner.os }}-${{ hashFiles('config/pipeline.yml', 'config/raster_sources.csv', 'R/raster_sources.R', 'scripts/download_rasters.R') }}
          restore-keys: |
            legacy-raster-sources-v4-${{ runner.os }}-

      - name: Parse executed scripts
        shell: Rscript {0}
        run: |
          parse(file = "scripts/download_rasters.R")
          parse(file = "scripts/prepare_rasters.R")
          parse(file = "analysis/run_bombus_availability.R")

      - name: Acquire source rasters
        shell: bash
        run: |
          set -euo pipefail
          if ! Rscript scripts/download_rasters.R >download.log 2>&1; then
            echo "=== raster download failure ==="
            tail -n 240 download.log
            exit 1
          fi

      - name: Rebuild and validate processed rasters
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data/processed/rasters
          rm -f data/processed/raster_manifest.csv
          if ! Rscript scripts/prepare_rasters.R --force --no-download >prepare.log 2>&1; then
            echo "=== raster preparation failure ==="
            tail -n 240 prepare.log
            exit 1
          fi
          Rscript - <<'RS'
          library(terra)
          files <- list.files("data/processed/rasters", pattern = "\\.tif$", full.names = TRUE)
          stopifnot(length(files) >= 19L)
          expected_extent <- c(128, 143, 30, 42)
          for (path in files) {
            r <- rast(path)
            ex <- as.vector(ext(r))
            if (nlyr(r) != 1L || ncell(r) == 0L || !all(is.finite(ex))) {
              stop("Invalid processed raster structure: ", path)
            }
            if (max(abs(ex - expected_extent)) > 1e-8) {
              stop("Unexpected processed raster extent: ", path, " [", paste(ex, collapse = ", "), "]")
            }
            sample_values <- values(r, mat = FALSE, dataframe = FALSE, na.rm = TRUE)
            if (!length(sample_values) || !any(is.finite(sample_values))) {
              stop("Processed raster has no finite values: ", path)
            }
          }
          RS

      - name: Run full analysis and expose failure tail
        shell: bash
        run: |
          set +e
          Rscript analysis/run_bombus_availability.R \
            Data_S1.csv data/processed/rasters sdm results/bombus_availability \
            >analysis.log 2>&1
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "=== analysis failure tail ==="
            tail -n 300 analysis.log
            exit "$status"
          fi
          echo "=== analysis completion tail ==="
          tail -n 100 analysis.log

      - name: Validate outputs
        shell: Rscript {0}
        run: |
          required <- file.path(
            "results/bombus_availability",
            c(
              "spde_model_comparison.csv",
              "spde_fixed_effects.csv",
              "spde_hyperparameters.csv",
              "blocked_cv_summary.csv",
              "environment_pca_loadings.csv",
              "row_flow.csv",
              "spatial_group_diagnostic.csv",
              "analysis_data.csv"
            )
          )
          stopifnot(all(file.exists(required)))
          comparison <- read.csv(required[[1]])
          stopifnot(nrow(comparison) == 4L, all(is.finite(comparison$WAIC)))

      - name: Upload diagnostic logs and outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-crs-fix-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            setup-system.log
            setup-r.log
            download.log
            prepare.log
            analysis.log
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
            results/bombus_availability
          if-no-files-found: warn
          retention-days: 7
