name: One-shot CRS-fix full-analysis verification

on:
  push:
    branches: ["analysis/minimal-bombus-availability"]
    paths:
      - ".github/workflows/verify-crs-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-crs-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[verify-crs-fix]')
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install system libraries quietly
        shell: bash
        run: |
          set -euo pipefail
          if ! {
            sudo apt-get update -qq
            sudo apt-get install --yes --no-install-recommends \
              libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
              libcurl4-openssl-dev libssl-dev unzip
          } >setup-system.log 2>&1; then
            tail -n 160 setup-system.log
            exit 1
          fi

      - name: Install R packages quietly
        shell: bash
        run: |
          set -euo pipefail
          if ! Rscript -e '
            install.packages(
              c("terra", "sf", "yaml", "digest", "jsonlite"),
              repos = "https://cloud.r-project.org"
            )
            install.packages(
              "INLA",
              repos = c(
                getOption("repos"),
                INLA = "https://inla.r-inla-download.org/R/stable"
              ),
              dependencies = TRUE
            )
            stopifnot(
              requireNamespace("terra", quietly = TRUE),
              requireNamespace("sf", quietly = TRUE),
              requireNamespace("yaml", quietly = TRUE),
              requireNamespace("digest", quietly = TRUE),
              requireNamespace("INLA", quietly = TRUE)
            )
          ' >setup-r.log 2>&1; then
            tail -n 200 setup-r.log
            exit 1
          fi

      - name: Restore public-raster cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/rasters
            data/processed/rasters
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
          key: legacy-rasters-v3-${{ runner.os }}-${{ hashFiles('config/pipeline.yml', 'config/raster_sources.csv', 'R/raster_sources.R', 'scripts/download_rasters.R', 'scripts/prepare_rasters.R') }}
          restore-keys: |
            legacy-rasters-v3-${{ runner.os }}-

      - name: Parse executed scripts
        shell: Rscript {0}
        run: |
          parse(file = "scripts/download_rasters.R")
          parse(file = "scripts/prepare_rasters.R")
          parse(file = "analysis/run_bombus_availability.R")

      - name: Acquire and prepare rasters quietly
        shell: bash
        run: |
          set -euo pipefail
          if ! Rscript scripts/download_rasters.R >download.log 2>&1; then
            tail -n 240 download.log
            exit 1
          fi
          if ! Rscript scripts/prepare_rasters.R --no-download >prepare.log 2>&1; then
            tail -n 240 prepare.log
            exit 1
          fi

      - name: Run full analysis and expose failure tail
        shell: bash
        run: |
          set +e
          Rscript analysis/run_bombus_availability.R \
            Data_S1.csv data/processed/rasters sdm results/bombus_availability \
            >analysis.log 2>&1
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "=== analysis failure tail ==="
            tail -n 300 analysis.log
            exit "$status"
          fi
          echo "=== analysis completion tail ==="
          tail -n 100 analysis.log

      - name: Validate outputs
        shell: Rscript {0}
        run: |
          required <- file.path(
            "results/bombus_availability",
            c(
              "spde_model_comparison.csv",
              "spde_fixed_effects.csv",
              "spde_hyperparameters.csv",
              "blocked_cv_summary.csv",
              "environment_pca_loadings.csv",
              "row_flow.csv",
              "spatial_group_diagnostic.csv",
              "analysis_data.csv"
            )
          )
          stopifnot(all(file.exists(required)))
          comparison <- read.csv(required[[1]])
          stopifnot(nrow(comparison) == 4L, all(is.finite(comparison$WAIC)))

      - name: Upload diagnostic logs and outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-crs-fix-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            setup-system.log
            setup-r.log
            download.log
            prepare.log
            analysis.log
            data/processed/raster_download_manifest.csv
            data/processed/raster_manifest.csv
            results/bombus_availability
          if-no-files-found: warn
          retention-days: 7

      - name: Persist verification result on the PR branch
        if: always()
        shell: bash
        env:
          VERIFY_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          {
            echo "workflow=verify-crs-fix"
            echo "source_head=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "job_status=${VERIFY_JOB_STATUS}"
            echo
            echo "=== analysis.log tail ==="
            if [[ -f analysis.log ]]; then
              tail -n 240 analysis.log
            else
              echo "analysis.log was not created; failure occurred before the analysis step."
              for log in setup-system.log setup-r.log download.log prepare.log; do
                if [[ -f "$log" ]]; then
                  echo
                  echo "=== ${log} tail ==="
                  tail -n 120 "$log"
                fi
              done
            fi
          } > diagnostics/verify-crs-fix-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/verify-crs-fix-status.txt
          if git diff --cached --quiet; then
            echo "Verification status is unchanged."
          else
            git commit -m "Record CRS full-analysis verification [skip ci]"
            git push
          fi
