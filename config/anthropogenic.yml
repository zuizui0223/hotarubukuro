version: 1
study_extent:
  xmin: 120
  xmax: 150
  ymin: 20
  ymax: 50
buffers_m: [500, 1000]

predictors:
  population_density:
    source: WorldPop 2020
    transform: log1p
    interpretation: introduction_pressure_and_observation_access
  human_footprint:
    source: Global Human Footprint 2009
    transform: zscore
    interpretation: composite_human_pressure
  built_fraction:
    source: public_landcover
    buffer_m: 1000
    interpretation: settlement_and_garden_proximity
  cropland_fraction:
    source: public_landcover
    buffer_m: 1000
    interpretation: managed_open_land_and_escape_establishment
  forest_fraction:
    source: public_landcover
    buffer_m: 1000
    interpretation: natural_landscape_context
  forest_edge_density:
    source: public_landcover
    buffer_m: 1000
    interpretation: satoyama_edge_and_establishment_opportunity

landcover_classes:
  # Provider codes are validated against the downloaded raster manifest before use.
  built: [50]
  cropland: [40]
  forest: [10, 20, 30]

qgam:
  quantiles: [0.75, 0.85, 0.90, 0.95]
  human_terms:
    - pop_density_log
    - human_footprint_z
    - built_fraction_1000m
    - cropland_fraction_1000m
    - forest_edge_density_1000m
  include_doy_interactions: true
  interpretation_boundary: >-
    These variables identify human-associated residual structure. They do not identify
    horticultural ancestry without independent image, locality, cultivation-history or
    genetic evidence.
